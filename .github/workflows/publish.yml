name: Render and deploy Quarto website

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quarto-publish-gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          cran_repository <- Sys.getenv(
            "RSPM",
            unset = "https://cloud.r-project.org"
          )
          install.packages(
            c("knitr", "rmarkdown", "yaml"),
            repos = cran_repository
          )

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
